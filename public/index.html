<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Nelly Store" />
    <title>Nelly</title>

    <!-- 🚀 Preconnect to improve initial connection speed -->
    <link rel="preconnect" href="https://nelly-mu.vercel.app" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🚀 Preload main CSS (injects faster render) -->
    <link
      rel="preload"
      href="/static/css/main.css"
      as="style"
    />

    <!-- 🚀 Optional: Preload hero images to improve LCP -->
    <link rel="preload" href="/images/slide-mobile.webp" as="image" />
    <link rel="preload" href="/images/slide-tv-1024.webp" as="image" />

    <!-- CRA will automatically inject bundled CSS and JS here -->
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
